<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Solicitacao de Pagamento</title>
  </head>
  <body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.7;color:#222222;background:#ffffff;">
    <div style="max-width:600px;padding:24px;">

      <p style="margin:0 0 16px;">Ola,</p>

      <p style="margin:0 0 16px;">
        Solicito o pagamento de <strong>{{fullName}}</strong>, referente ao programa
        <strong>{{programaFullName}}</strong>, no mes de referencia <strong>{{mesDisplay}}</strong>.
      </p>

      <p style="margin:0 0 6px;">Termo de parceria assinado:</p>
      <p style="margin:0 0 16px;">
        <a href="{{linkTermoAssinado}}" style="color:#2563eb;text-decoration:none;">{{linkTermoAssinado}}</a>
      </p>

      <p style="margin:0 0 16px;">
        Valor a pagar: <strong>{{valorAPagar}}</strong>
      </p>

      <p style="margin:0;">Atenciosamente,</p>

    </div>
  </body>
</html>
